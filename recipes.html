<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MellowFood | Recipes</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="index.html" aria-label="MellowFood home">
      <div class="brand-mark">MF</div>
      <span>MellowFood</span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="recipes.html" aria-current="page">Recipes</a>
      <a href="details.html">Details</a>
      <a href="flavors.html">Flavors</a>
    </nav>

    <a class="btn secondary" href="recipes.html">Browse</a>
  </div>
</header>

<main class="section">
  <div class="container">
    <header class="page-head">
      <div class="kicker">recipe index</div>
      <h1 class="page-title">All recipes</h1>
      <p class="page-subtitle">
        Browse recipe-book style cards organized by seasoning profile.
      </p>
    </header>

    <section class="filter card" aria-label="Flavor filter">
      <div class="filter-row">
        <span class="filter-label">Filter:</span>

        <input class="filter-input" type="radio" name="flavor" id="flavor-all" checked>
        <label class="chip" for="flavor-all">All</label>

        <input class="filter-input" type="radio" name="flavor" id="flavor-garlic">
        <label class="chip" for="flavor-garlic">Garlic</label>

        <input class="filter-input" type="radio" name="flavor" id="flavor-herb">
        <label class="chip" for="flavor-herb">Herbs</label>

        <input class="filter-input" type="radio" name="flavor" id="flavor-spice">
        <label class="chip" for="flavor-spice">Spice</label>

        <input class="filter-input" type="radio" name="flavor" id="flavor-citrus">
        <label class="chip" for="flavor-citrus">Citrus</label>
      </div>
    </section>
  </div>
</main>

<footer class="site-footer">
  <div class="container">© 2026 MellowFood</div>
</footer>

</body>
</html>
